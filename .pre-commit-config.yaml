# Pre-commit hooks for V-Pack Monitor
# Install: pip install -r requirements-dev.txt && pre-commit install
# Pre-push hooks: pre-commit install --hook-type pre-push
# Run manually: pre-commit run --all-files

repos:
  # ── Ruff: lint + format ───────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^(web-ui/|%TEMP%|venv/|\.venv/|bin/)
      - id: ruff-format
        name: ruff format
        exclude: ^(web-ui/|%TEMP%|venv/|\.venv/|bin/)

  # ── Secret detection ──────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(web-ui/package-lock\.json|%TEMP%|venv/|\.venv/|bin/|\.secrets\.baseline)

  # ── .ai-sync/ sync enforcement ────────────────────────
  - repo: local
    hooks:
      - id: ai-sync-check
        name: .ai-sync/ sync check (auto-regenerates platform configs)
        entry: python .ai-sync/sync.py
        language: system
        files: ^\.ai-sync/
        pass_filenames: false

  # ── Pre-push: branch protection ────────────────────────
  - repo: local
    hooks:
      - id: check-protected-branch
        name: check protected branch (master/dev)
        entry: python .git-hooks/check-protected-branch.py
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

  # ── Pre-push: run tests ───────────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ --tb=short -q
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
      - id: eslint
        name: eslint (frontend)
        entry: python -c "import subprocess,sys; files=[f.replace('web-ui/','',1) for f in sys.argv[1:]]; subprocess.run(['npx','eslint']+(files or ['.']), cwd='web-ui', check=True, shell=True)"
        language: system
        files: ^web-ui/src/.*\.(js|jsx)$
        pass_filenames: true
      - id: prettier
        name: prettier (frontend)
        entry: python -c "import subprocess,sys; files=[f.replace('web-ui/','',1) for f in sys.argv[1:]]; subprocess.run(['npx','prettier','--check']+(files or ['.']), cwd='web-ui', check=True, shell=True)"
        language: system
        files: ^web-ui/src/.*\.(js|jsx)$
        pass_filenames: true
